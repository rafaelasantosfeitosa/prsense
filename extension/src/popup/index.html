<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>PRsense</title>
    <style>
      body {
        margin: 0;
        width: 280px;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1115;
        color: #e6e8eb;
        padding: 16px;
      }
      h1 { margin: 0 0 4px; font-size: 16px; }
      .meta { color: #9aa3ad; font-size: 12px; }
      button {
        font: inherit;
        cursor: pointer;
        margin-top: 12px;
        padding: 8px 14px;
        border-radius: 6px;
        border: none;
        background: #3b82f6;
        color: white;
        width: 100%;
        font-weight: 600;
      }
      button.secondary { background: #1a1f27; border: 1px solid #2b313a; color: #e6e8eb; }
      .status { margin-top: 8px; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>PRsense</h1>
    <p class="meta">Open any GitHub PR to review.</p>
    <div class="status" id="status">Checking sign-in…</div>
    <button id="sign-in">Sign in with GitHub</button>
    <button id="sign-out" class="secondary" hidden>Sign out</button>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
